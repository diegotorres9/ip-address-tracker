<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="./styles/style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css"
  integrity="sha512-xodZBNTC5n17Xt2atTPuE1HxjVMSvLVW9ocqUKLsCC5CXdbqCmblAshOMAS6/keqq/sMZMZ19scR4PsZChSR7A=="
  crossorigin=""/>
  <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"
  integrity="sha512-XQoYMqMTK8LvdxXYG3nZ448hOEQiglfqkJs1NOQV44cWnUrBc8PkAOcXy20w0vlaXaVUearIOBhiXZ5V3ynxwA=="
  crossorigin=""></script>
  <title>Frontend Mentor | IP Address Tracker</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 11px; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>
  <main style="display: flex; flex-direction: column; align-items: center;">
    <div class="tracker-group">
      <h1>IP Address Tracker</h1>
      <form action="">
        <input type="search" name="id-address" id="ip-address" placeholder="Search for any IP address or domain">
        <button>
          <svg xmlns="http://www.w3.org/2000/svg" width="11" height="14">
            <path fill="000" stroke="#FFF" stroke-width="3" d="M1 1l6 6-6 6"/>
          </svg>
        </button>
      </form>
      <!-- <input type="search" name="ip-address" id="ip-address" placeholder="Search for any IP address or domain"> -->
    </div>
    <div class="location-grid">
      <div class="grid-item address">
        <p>IP Address</p>
        <span></span>
      </div>
      <div class="grid-item location">
        <p>Location</p>
        <span></span>
      </div>
      <div class="grid-item timezone">
        <p>Timezone</p>
        <span>UTC<!-- add offset value dynamically using the API --></span>
      </div>
      <div class="grid-item isp">
        <p>ISP</p>
        <span></span>
      </div>
    </div>
    <div class="location-map" id="location-map"></div>
  </main>

  <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="#">Your Name Here</a>.
  </div>

  <script src="./js/scripts.js"></script>
</body>
</html>
